name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── TUI release (Linux + macOS CLI) via GoReleaser ─────────────────────
  release-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Desktop .app bundle (macOS only) ───────────────────────────────────
  release-desktop:
    strategy:
      matrix:
        include:
          - runner: macos-14        # Apple Silicon (arm64)
            arch: arm64
          - runner: macos-13        # Intel (amd64)
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build desktop binary
        run: |
          mkdir -p dist
          CGO_ENABLED=1 CGO_LDFLAGS="-framework UniformTypeIdentifiers" \
            go build -tags desktop,production \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/Go-Beats ./cmd/go-beats-desktop

      - name: Package .app bundle
        run: |
          mkdir -p "dist/Go-Beats.app/Contents/MacOS"
          mkdir -p "dist/Go-Beats.app/Contents/Resources"
          cp build/darwin/Info.plist "dist/Go-Beats.app/Contents/"
          cp dist/Go-Beats "dist/Go-Beats.app/Contents/MacOS/"
          cp build/darwin/iconfile.icns "dist/Go-Beats.app/Contents/Resources/"

      - name: Create archive
        run: |
          cd dist
          tar -czf "Go-Beats_${{ steps.version.outputs.version }}_darwin_${{ matrix.arch }}.app.tar.gz" Go-Beats.app

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Go-Beats_${{ steps.version.outputs.version }}_darwin_${{ matrix.arch }}.app.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
